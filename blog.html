<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Post — Inkwell</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">✦ Inkwell <span>/ blog</span></a>
      <nav id="main-nav"></nav>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
    <nav class="mobile-nav" id="mobile-nav"></nav>
  </header>

  <!-- BLOG POST -->
  <div class="blog-page">

    <a href="index.html" class="blog-back">← Back to all posts</a>

    <div class="blog-header">
      <a href="#" class="blog-category-tag" id="blog-category">Category</a>
      <h1 class="blog-page-title" id="blog-page-title">Post Title</h1>
      <div class="blog-meta">
        <span id="blog-date">Date</span>
      </div>
    </div>

    <!-- Blog content injected here -->
    <div class="blog" id="blog-content">
      <p style="color:var(--text3)">Loading post...</p>
    </div>

  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-inner">
      <span class="footer-logo">✦ Inkwell</span>
      <span class="footer-copy">© 2025 Inkwell. All rights reserved.</span>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
