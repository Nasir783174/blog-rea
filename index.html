<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inkwell — Stories Worth Reading</title>
  <meta name="description" content="A personal blog covering travel, technology, food, and lifestyle."/>
  <link rel="stylesheet" href="css/style.css"/>

<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">✦ Inkwell <span>/ blog</span></a>
      <nav id="main-nav"></nav>
      <button class="hamburger" id="hamburger" aria-label="Menu">

      </button>
    </div>
    <nav class="mobile-nav" id="mobile-nav"></nav>

  <!-- HERO -->
  <section class="hero">
    <h1 class="hero-title">
      Words that <em>linger</em><br>long after reading.
    </h1>

      Travel · Technology<br>
      Food · Lifestyle<br>
      ——————<br>

    <div id="posts-grid">

      <span class="footer-logo">✦ Inkwell</span>
      <span class="footer-copy">© 2025 Inkwell. All rights reserved.</span>
